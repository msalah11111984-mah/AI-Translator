name: Build AI Translator APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgmp-dev xclip xsel libgtk-3-dev lld
        pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Auto Accept SDK Licenses via Android Home
      run: |
        # إنشاء مجلدات التهيئة المسبقة لرخص أندرويد
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        
        # استخدام الأداة المثبتة مسبقاً في نظام السيرفر للموافقة الفورية على رخص جوجل
        if [ -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        elif [ -f "$ANDROID_HOME/tools/bin/sdkmanager" ]; then
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses
        fi

    - name: Build Android APK
      run: |
        # بدء بناء التطبيق بالاعتماد على الرخص المقبولة مسبقاً
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-Translator-Pro
        path: bin/*.apk
