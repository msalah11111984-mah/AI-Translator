name: Build AI Translator APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer and Java Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgmp-dev xclip xsel libgtk-3-dev lld
        pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Install Android SDK and Pre-Accept Licenses
      run: |
        # إنشاء المجلدات الرسمية لأدوات أندرويد
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
        cd $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
        
        # تحميل حزمة أدوات أندرويد الرسمية لعام 2026 مباشرة من سيرفرات جوجل
        wget https://google.com -O cmdline-tools.zip
        unzip cmdline-tools.zip && rm cmdline-tools.zip
        mv cmdline-tools latest
        
        # قبول كافة رخص أندرويد تلقائياً بشكل إجباري وقاطع
        yes | ./latest/bin/sdkmanager --licenses --sdk_root=$HOME/.buildozer/android/platform/android-sdk

    - name: Build Android APK
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-Translator-Pro
        path: bin/*.apk
