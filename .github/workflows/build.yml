name: Build AI Translator APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgmp-dev xclip xsel libgtk-3-dev lld
        pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        yes | buildozer android pgo_build || true
        if [ -d "$HOME/.buildozer/android/platform/android-sdk" ]; then
          yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        fi

    - name: Build Android APK
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-Translator-Pro
        path: bin/*.apk
